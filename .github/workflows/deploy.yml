# ============================================================================
# Pstep Web UI — 独立部署工作流
# 触发方式：
#   1. 手动触发 (workflow_dispatch)
#   2. push 到 main 分支时自动触发
# ============================================================================

name: 🚀 Deploy Web UI

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.1)'
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'index.html'
      - '.github/workflows/deploy.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    name: Build & Deploy Web UI
    runs-on: ubuntu-latest

    steps:
      - name: 🔨 Checkout
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

      - name: 🚀 Deploy to server
        env:
          SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set -e

          # 配置 SSH
          mkdir -p ~/.ssh
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null || echo '[WARN] ssh-keyscan failed'
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo '🛑 停止 web 服务...'
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key root@$SERVER_HOST 'systemctl stop pstep-web'

          echo '📦 备份...'
          TS=$(date +%Y%m%d_%H%M%S)
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key root@$SERVER_HOST "mkdir -p /opt/pstep/backups/$TS && cp -r /opt/pstep/web /opt/pstep/backups/$TS/"

          echo '📤 部署 web...'
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key root@$SERVER_HOST 'rm -rf /opt/pstep/web/dist/*'
          tar cz -C . dist |             ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key root@$SERVER_HOST 'tar xz -C /opt/pstep/web'

          echo '🚀 启动 web...'
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key root@$SERVER_HOST 'systemctl start pstep-web'

          echo '🔍 健康检查...'
          sleep 2
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key root@$SERVER_HOST '
            echo "=== Web Status ==="
            systemctl is-active pstep-web
            echo "=== Web HTTP ==="
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:5173
            echo ""
          '

          echo '✅ Web UI 部署完成!'

