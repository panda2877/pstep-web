# ============================================================================
# Pstep Web UI — 独立部署工作流
# 触发方式：
#   1. 手动触发 (workflow_dispatch)
#   2. push 到 main 分支时自动触发
# ============================================================================

name: 🚀 Deploy Web UI

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.1)'
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'index.html'
      - '.github/workflows/deploy.yml'
      - '.env.production'


jobs:
  deploy:
    name: Build & Deploy Web UI
    runs-on: ubuntu-latest

    steps:
      - name: 🔨 Checkout
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: 🔐 NPM Authentication
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "ERROR: NPM_TOKEN secret is not configured!"
            echo "Please add NPM_TOKEN in GitHub repository secrets:"
            echo "https://github.com/panda2877/pstep-web/settings/secrets/actions"
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          echo "NPM token configured for private packages"

      - name: 📦 Install dependencies
        run: |
          rm -rf node_modules
          npm install

      - name: ✅ Verify vite installed
        run: |
          echo "Checking vite installation..."
          if [ -f "node_modules/.bin/vite" ]; then
            echo "vite found at node_modules/.bin/vite"
            ./node_modules/.bin/vite --version
          else
            echo "vite NOT found!"
            ls -la node_modules/.bin/ 2>/dev/null || echo "node_modules/.bin does not exist"
            exit 1
          fi

      - name: 🏗️ Build
        run: npm run build

      - name: 🚀 Deploy to server
        env:
          SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ vars.SERVER_HOST }}
        run: |
          set -e

          mkdir -p ~/.ssh
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null || echo '[WARN] ssh-keyscan failed'
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo 'Stopping web service...'
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key agentuser@$SERVER_HOST 'sudo systemctl stop pstep-web || true'

          echo 'Backup...'
          TS=$(date +%Y%m%d_%H%M%S)
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key agentuser@$SERVER_HOST "if [ -d /opt/pstep/web ]; then sudo mkdir -p /opt/pstep/backups/$TS && sudo cp -r /opt/pstep/web /opt/pstep/backups/$TS/; else echo 'skip backup'; fi"

          echo 'Deploy web...'
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key agentuser@$SERVER_HOST "sudo rm -rf /opt/pstep/web/dist/* 2>/dev/null; sudo mkdir -p /opt/pstep/web"
          tar cz -C . dist package.json | ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key agentuser@$SERVER_HOST "sudo tar xz -C /opt/pstep/web"

          echo 'Start web...'
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key agentuser@$SERVER_HOST 'sudo systemctl start pstep-web'

          echo 'Health check...'
          sleep 2
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key agentuser@$SERVER_HOST '
            echo "=== Web Status ==="
            sudo systemctl is-active pstep-web
            echo "=== Web HTTP ==="
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:5173
            echo ""
          '

          echo 'Web UI deploy complete!'