# 🚀 一键构建 + 部署
#
# 触发方式: GitHub UI → Actions → "🚀 一键构建 + 部署" → Run workflow
# 效果: 构建 pstep-gateway + pstep-web → SCP 到服务器 → 重启服务
#
# 前置条件:
#   1. 在 GitHub 设置 GH_PAT (Personal Access Token) → Secrets
#   2. 在 GitHub 设置 SERVER_SSH_KEY → Secrets
#
# 架构:
#   pi 的 npm 包直接从 npm registry 安装（@earendil-works/pi-*）
#   pstep-engine 目前空壳，暂不加入 CI

name: 🚀 一键构建 + 部署

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        type: string

jobs:
  build-and-deploy:
    name: 构建并部署 v\${{ github.event.inputs.version }}
    runs-on: ubuntu-latest

    steps:
      # ============================================================
      # 1. Clone 仓库
      # ============================================================
      - name: 🔨 Checkout pstep-web
        uses: actions/checkout@v4

      - name: 🔨 Checkout pstep-gateway
        uses: actions/checkout@v4
        with:
          repository: panda2877/pstep-gateway
          token: \${{ secrets.GH_PAT }}
          path: pstep-gateway

      # ============================================================
      # 2. 构建 pstep-gateway
      # ============================================================
      - name: 🏗️ Build pstep-gateway
        run: |
          cd pstep-gateway
          npm install
          npm run build
          echo "✅ gateway 构建完成"
          echo "   dist: \$(du -sh dist | cut -f1)"
          echo "   node_modules: \$(du -sh node_modules | cut -f1)"

      # ============================================================
      # 3. 构建 pstep-web
      # ============================================================
      - name: 🏗️ Build pstep-web
        run: |
          npm install
          npm run build
          echo "✅ web 构建完成"
          echo "   dist: \$(du -sh dist | cut -f1)"

      # ============================================================
      # 4. 部署到服务器
      # ============================================================
      - name: 🚀 Deploy to server
        env:
          SSH_KEY: \${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -e

          # ---- 4a. 配置 SSH ----
          mkdir -p ~/.ssh
          echo "\$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          DEST="root@43.173.101.44"

          echo "🛑 停止服务..."
          ssh \$SSH_OPTS \$DEST 'systemctl stop pstep-web pstep-gateway'

          echo "📦 备份当前版本..."
          TS=\$(date +%Y%m%d_%H%M%S)
          ssh \$SSH_OPTS \$DEST "mkdir -p /opt/pstep/backups/\$TS &&             cp -r /opt/pstep/gateway /opt/pstep/backups/\$TS/ &&             cp -r /opt/pstep/web /opt/pstep/backups/\$TS/ &&             echo 'backup saved to /opt/pstep/backups/\$TS'"

          echo "📤 部署 gateway (dist + node_modules)..."
          ssh \$SSH_OPTS \$DEST 'rm -rf /opt/pstep/gateway/dist/* /opt/pstep/gateway/node_modules'
          tar cz -C pstep-gateway dist node_modules |             ssh \$SSH_OPTS \$DEST 'tar xz -C /opt/pstep/gateway'

          echo "📤 部署 web (dist)..."
          ssh \$SSH_OPTS \$DEST 'rm -rf /opt/pstep/web/dist/*'
          tar cz -C pstep-web dist |             ssh \$SSH_OPTS \$DEST 'tar xz -C /opt/pstep/web'

          echo "🚀 启动服务..."
          ssh \$SSH_OPTS \$DEST 'systemctl start pstep-gateway && sleep 3 && systemctl start pstep-web'

          echo "🔍 健康检查..."
          sleep 2
          ssh \$SSH_OPTS \$DEST '
            echo "=== Gateway Health ==="
            curl -s http://localhost:3001/health
            echo ""
            echo "=== Gateway Status ==="
            systemctl is-active pstep-gateway
            echo "=== Web Status ==="
            systemctl is-active pstep-web
            echo "=== Web HTTP ==="
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:5173
            echo ""
          '

          echo "✅ 部署完成!"

